    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<body class="bg-[#f8fafc] max-w-[1500px] h-screen mx-auto">
    <!-- heading section  -->
    <header class="  bg-white shadow border-b-3  sticky top-0  z-20">
        <div class="flex flex-col md:flex-row justify-between py-4 px-3 gap-4">
            <div class="flex items-center">
                <img src="./assets/github-logo.png" alt="" class="w-10">
                <p class="text-xl font-bold">GitHub Issues Tracker</p>
            </div>
            <!-- search button ......... -->
            <div class="flex items-center gap-2">
                <label class="input outline-none">
                    <svg class="h-[1em] opacity-50 " xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-box" type="search" required placeholder="Search issues" class="outline-none " />
                </label>

                <button class="btn btn-neutral""><i class=" fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <!-- button section ......... -->
    <section class="w-11/12 mx-auto bg-white shadow mt-3 md:mt- rounded-xl border-b-3">
       <div class="py-5 px-5 ">
         <div id="buttons" class="flex items-center gap-3">
            <button id="all-button" class="issueBtn  btn btn-outline btn-neutral">All</button>
            <button id="open-button" class=" issueBtn  btn btn-outline  btn-neutral">Open</button>
            <button id="close-button" class=" issueBtn  btn btn-outline btn-neutral">Closed</button>
        </div>

       </div>

    </section>

    <!-- count div number //.. -->
<section class="w-11/12 mx-auto bg-white shadow mt-3 md:mt-5 rounded-xl border-b-3">
       <div class="flex flex-col md:flex-row justify-between gap-4 py-5 px-5 ">
         <div class="flex justify-center items-center gap-3">
              <div class="w-[30px] h-[30px] bg-[#ece4ff] rounded-full px-1 py-1">
                <img src="./assets/Aperture.png" alt="">
              </div>
              <div>
                <p class="font-bold text-[1.25rem] "><span id="issues-total">0</span> Issues</p>
                <p class="font-light text-[12px] md:text-[16px]">Track and manage your project issues</p>
              </div>
        </div>
        <div class="flex items-center gap-3 px-5">
            <p><span><i class="fa-solid fa-circle text-[#00a96e]"></i></span>Open</p>
            <p><span><i class="fa-solid fa-circle  text-[#a855f7]"></i></span>Close</p>

        </div>
       </div>

    </section>

    <!-- spinner section ... -->
    <section id="spinner" class=" flex justify-center items-center mt-24 py-10 gap-2 hidden ">
        <span class="loading loading-bars loading-md"></span>
        <span class="loading loading-bars loading-lg"></span>
        <span class="loading loading-bars loading-xl"></span>
    </section>

     <!-- issues container ..... -->
